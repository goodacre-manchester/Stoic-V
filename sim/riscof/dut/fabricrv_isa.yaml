hart_ids: [0]
hart0:
  # In-scope ISA for conformance signoff: base integer + M + Zba/Zbb/Zbs.
  # Deliberately omits Zbc (no clmul*), C, A, F/D, S/U and Zifencei so RISCOF
  # selects only the I, M and Zba/Zbb/Zbs suites (the §10.3 carve-out).
  ISA: RV32IMZicsr_Zba_Zbb_Zbs
  physical_addr_sz: 32
  User_Spec_Version: '2.3'
  supported_xlen: [32]
  misa:
    # Only single-letter extensions set misa bits: I (8) + M (12) = 0x1100.
    # Zba/Zbb/Zbs are multi-letter and do NOT set misa.B.
    reset-val: 0x40001100
    rv32:
      accessible: true
      mxl:
        implemented: true
        type:
          warl:
            dependency_fields: []
            legal:
              - mxl[1:0] in [0x1]
            wr_illegal:
              - Unchanged
      extensions:
        implemented: true
        type:
          warl:
            dependency_fields: []
            legal:
              - extensions[25:0] bitmask [0x0001100, 0x0000000]
            wr_illegal:
              - Unchanged
